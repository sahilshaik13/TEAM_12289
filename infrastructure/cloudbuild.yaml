steps:
  - name: "python:3.12"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install -r requirements.txt
        ruff check app/ || true
        pytest tests/ -v --tb=short || true

  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "asia-south1-docker.pkg.dev/sap-capstone-492614/echomemory/echomemory-api:latest", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "asia-south1-docker.pkg.dev/sap-capstone-492614/echomemory/echomemory-api:latest"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - "run"
      - "deploy"
      - "echomemory-api"
      - "--image=asia-south1-docker.pkg.dev/sap-capstone-492614/echomemory/echomemory-api:latest"
      - "--region=asia-south1"
      - "--platform=managed"

images:
  - "asia-south1-docker.pkg.dev/sap-capstone-492614/echomemory/echomemory-api:latest"
